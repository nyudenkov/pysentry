# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json
name: Bug Report
description: Report a bug or unexpected behavior in PySentry
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the sections below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Run `pysentry-rs ...`
        2. With this `requirements.txt` / `pyproject.toml` / ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include the full error output if applicable.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: PySentry Version
      placeholder: "e.g. 0.4.5 — run `pysentry-rs --version`"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Additional Environment Details
      description: Python version, package manager (uv, pip, Poetry, etc.), relevant config.
      placeholder: |
        Python: 3.12.1
        Package manager: uv 0.11.6
        Config: .pysentry.toml present
    validations:
      required: false
