# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json
name: Feature Request
description: Suggest a new feature or improvement for PySentry
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem you're trying to solve and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Who is affected and how?
      placeholder: "When auditing a project with X, I can't do Y because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the behavior or CLI interface you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you considered and why you prefer your proposed solution.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links, examples from other tools, or anything else relevant.
    validations:
      required: false
